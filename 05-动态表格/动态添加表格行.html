<!doctype html>
<html>
<head>
<meta charset="utf-8">
<STYLE type="text/css">
.myInput {
	BORDER: 1px solid;
}
</STYLE>
</HEAD>

<BODY>
	购买清单
	<INPUT name="button" type="button" onClick="createRow()" value="添加">
	<INPUT name="button" type="button" onClick="delRow()" value="删除">

	<TABLE width="276" border="1" id="myTable">
		<TR>
			<TD width="136">购买物品</TD>
			<TD width="124">数 量</TD>
		</TR>
		<TR>
			<TD>U盘</TD>
			<TD>2</TD>
		</TR>
		<TR>
			<TD>Q笔</TD>
			<TD>3</TD>
		</TR>


	</TABLE>

	<BR />
</BODY>

<script type="text/javascript">
	//增加行 
	//document.createElement()是在对象中创建一个对象，要与appendChild() 或 insertBefore()方法联合使用。
	//其中，appendChild() 方法在节点的子节点列表末添加新的子节点。
	//insertBefore() 方法在节点的子节点列表任意位置插入新的节点。
	                                                                    
	function createRow() {                                              // <div id="board"></div>
		//为这个表格添加新行                                               //<script type="text/javascript">
		var tr = document.createElement("tr");                          //var board = document.getElementById("board");
		var td0 = document.createElement("td");   
		//给按钮添加复选框方便删除和选择                                     //var e = document.createElement("input");
		var checkbox = document.createElement("input");                 //e.type = "button";
		checkbox.type = "checkbox";                                     //e.value = "这是测试加载的小例子";
		checkbox.name = "checkRow";                                     //var object = board.appendChild(e);
		td0.appendChild(checkbox);
		//添加购买物品下面的一行                                            //   <\script>
		var td1 = document.createElement("td");
		//添加数量下面这一行                                               //效果：在标签board中加载一个按钮，属性值为“这是测试加载的小例子”
		tr.appendChild(td0);
		tr.appendChild(td1);
		myTable.appendChild(tr);
	}
	//删除行
	function delRow() {
		if (confirm("确认删除所选?")) {
			var checkboxs = document.getElementsByName("checkRow");
			for (var i = 0; i < checkboxs.length; i++) {
				if (checkboxs[i].checked) {
					var n = checkboxs[i].parentNode.parentNode;
					myTable.removeChild(n);
					i--;
				}
			}

		}
	}
</script>
</HTML>
